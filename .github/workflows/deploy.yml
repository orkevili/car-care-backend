name: Django CI/CD with Cloudflare Tunnel

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # 1. Tesztelés a GitHub szerverein
  build-and-test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: "dummy-secret-key-for-testing-only-12345"
      DEBUG: "True"
      FRONTEND_URL: "http://localhost:5173"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12.10'

    - name: Install requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Database migrations (SQLite)
      working-directory: car_care
      run: |
        python manage.py makemigrations
        python manage.py migrate

    - name: Run tests
      working-directory: car_care
      run: |
        python manage.py test

  # 2. Élesítés a te szervereden (Cloudflare Tunnellel)
  deploy:
    name: Deploy to Homelab
    needs: build-and-test
    runs-on: self-hosted
    environment: production
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Kód letöltése a Homelabre
      uses: actions/checkout@v4

    - name: Régi konténerek leállítása
      run: docker compose down

    - name: Éles .env fájl generálása
      # Ne felejtsd el felvenni a PROD_SECRET_KEY és CLOUDFLARE_TUNNEL_TOKEN változókat a GitHub Secrets-be!
      run: |
        echo "SECRET_KEY=${{ secrets.PROD_SECRET_KEY }}" > .env
        echo "TUNNEL_TOKEN=${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}" >> .env
        echo "DEBUG=False" >> .env
        # Fontos: Ide a Cloudflare-ben beállított publikus domainedet írd!
        echo "ALLOWED_HOSTS=${{ vars.ALLOWED_HOSTS }}" >> .env
        echo "CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}" >> .env

    - name: Docker konténer újraépítése és indítása
      run: |
        # Elindítja a Django appot és a Cloudflared tunnelt is
        docker compose up -d --build

    - name: Adatbázis migrációk futtatása a futó konténerben
      run: |
        # Ellenőrizd, hogy a konténered neve tényleg 'django_car_care'-e a docker-compose.yml-ben!
        docker exec django_car_care python manage.py migrate

    - name: Felesleges Docker image-ek takarítása
      # Ez letörli azokat a régi image-eket, amik már nem futnak, így nem telik be a szervered vinyója
      run: docker image prune -f