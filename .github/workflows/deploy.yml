name: Django CI/CD with Cloudflare Tunnel

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main"]

jobs:
  # 1. Test on Github servers
  build-and-test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: "dummy-secret-key-for-testing-only-12345"
      DEBUG: "True"
      FRONTEND_URL: "http://localhost:5173"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12.10'

    - name: Install requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Database migrations (SQLite)
      working-directory: car_care
      run: |
        python manage.py makemigrations
        python manage.py migrate

    - name: Run tests
      working-directory: car_care
      run: |
        python manage.py test

  # 2. Deployment (with Cloudflare Tunnel)
  deploy:
    name: Deploy
    needs: build-and-test
    runs-on: self-hosted
    environment: production
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Download code to server
      uses: actions/checkout@v4

    - name: Stop old containers
      run: docker compose down

    - name: Generate production .env file
      run: |
        echo "SECRET_KEY=${{ secrets.PROD_SECRET_KEY }}" > .env
        echo "TUNNEL_TOKEN=${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}" >> .env
        echo "DEBUG=False" >> .env
        echo "ALLOWED_HOSTS=${{ vars.ALLOWED_HOSTS }}" >> .env
        echo "CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}" >> .env

    - name: Docker container rebuild and start
      run: |
        docker compose up -d --build

    - name: Make database migrations on the running container
      run: |
        docker exec car_care_backend python manage.py migrate

    - name: Clean dangling Docker images
      run: docker image prune -f