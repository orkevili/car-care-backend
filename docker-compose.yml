version: '3.8'

services:
  #Django
  app:
    container_name: django_car_care
    build: .
    restart: always
    env_file:
      - .env
    networks:
      - car_care_net

  #Cloudflare Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: django_cloudflare
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    env_file:
      - .env
    depends_on:
      - app
    networks:
      - car_care_net

networks:
  car_care_net:
    external: true